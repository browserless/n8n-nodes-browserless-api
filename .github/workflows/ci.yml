name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true
      - name: Ensure npm >= 11.10.0 (min-release-age support)
        run: npm install -g npm@11.17.0 --ignore-scripts

      - name: Install dependencies
        run: 'npm ci'

      - name: Run lint
        run: 'npm run lint'

      - name: Run build
        run: 'npm run build'

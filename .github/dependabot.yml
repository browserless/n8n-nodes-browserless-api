version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown: &a1
      default-days: 3
    groups:
      types:
        patterns:
          - "@types/*"
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown: *a1
    groups:
      github-actions:
        patterns:
          - "*"
